<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 자산 추이 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fc; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 700; color: #4e73df; }
        h2 { font-size: 18px; font-weight: 700; color: #5a5c69; margin-top: 40px; margin-bottom: 15px; }
        
        /* 💎 대시보드 카드 스타일 */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #4e73df;
        }
        .card.success { border-left-color: #1cc88a; }
        .card.info { border-left-color: #36b9cc; }
        .card.warning { border-left-color: #f6c23e; }
        .card.purple { border-left-color: #6b21a8; } 
        .card.dark { border-left-color: #374151; }
        .card.red { border-left-color: #b91c1c; }
        .card.orange { border-left-color: #ea580c; }
        
        .card-title { font-size: 12px; font-weight: bold; color: #858796; text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 22px; font-weight: bold; color: #5a5c69; }
        
        /* 📈 차트 영역 스타일 */
        .chart-section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .loading { text-align: center; color: #888; font-style: italic; padding: 50px; background: white; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 나의 자산 추이 대시보드</h1>
    
    <div id="loading" class="loading">구글 스프레드시트 및 해외 시장 지표를 안전하게 불러오는 중...</div>
    
    <div id="cardsSection" class="dashboard-cards" style="display: none;">
        <div class="card">
            <div class="card-title">현재 총 자산</div>
            <div id="currentBalance" class="card-value">- 원</div>
        </div>
        <div class="card success">
            <div class="card-title">전일 대비 변동</div>
            <div id="dayChange" class="card-value">- 원</div>
        </div>
        <div class="card info">
            <div class="card-title">역대 최고 자산</div>
            <div id="maxBalance" class="card-value">- 원</div>
        </div>
        <div class="card warning">
            <div class="card-title">누적 기록 일수</div>
            <div id="recordDays" class="card-value">- 일</div>
        </div>
    </div>
    
    <div id="chartSection" class="chart-section" style="display: none;">
        <div class="chart-container">
            <canvas id="assetLineChart"></canvas>
        </div>
    </div>

    <div id="marketSectionTitle" style="display: none;">
        <h2>🌐 주요 시장 지표 (최근 영업일 기준)</h2>
    </div>
    <div id="marketCardsSection" class="dashboard-cards" style="display: none;">
        <div class="card dark">
            <div class="card-title">TQQQ 종가</div>
            <div id="tqqqClose" class="card-value">불러오는 중...</div>
        </div>
        <div class="card orange">
            <div class="card-title">SOXL 종가</div>
            <div id="soxlClose" class="card-value">불러오는 중...</div>
        </div>
        <div class="card red">
            <div class="card-title">VIX 지수</div>
            <div id="vixIndex" class="card-value">불러오는 중...</div>
        </div>
        <div class="card purple">
            <div class="card-title">Fear & Greed 지수</div>
            <div id="fearGreed" class="card-value">불러오는 중...</div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 기존에 사용하시던 값을 기입해 주세요
    const SHEET_ID = '1GJpFxW6yasMCEu4UKxcSsDhVnmIAMtwjPO5qQ7akBIY'; 
    const API_KEY = 'AIzaSyAWN9cfckqJtiWaBPdcvmysW7iW9mJEVpc';
    
    const SHEET_NAME = encodeURIComponent('성곤 자산'); 
    const RANGE = `${SHEET_NAME}!U1:V`; 
    const URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

    // 🌐 인터넷에서 실시간 주가 및 지수를 가져오는 함수 (AllOrigins 프록시 우회 적용)
    async function fetchMarketData() {
        try {
            const stockUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=TQQQ,SOXL,^VIX`;
            
            // CORS 차단을 우회하기 위해 전송받은 내용을 객체화해주는 allorigins 프록시 사용
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(stockUrl)}`);
            const proxyData = await response.json();
            
            // 알맹이 텍스트를 JSON으로 파싱
            const result = JSON.parse(proxyData.contents);
            const quotes = result.quoteResponse.result;

            quotes.forEach(quote => {
                const price = quote.regularMarketPrice;
                if (quote.symbol === 'TQQQ') {
                    document.getElementById('tqqqClose').innerText = `$${price.toFixed(2)}`;
                } else if (quote.symbol === 'SOXL') {
                    document.getElementById('soxlClose').innerText = `$${price.toFixed(2)}`;
                } else if (quote.symbol === '^VIX') {
                    document.getElementById('vixIndex').innerText = `${price.toFixed(2)}`;
                }
            });
        } catch (e) {
            console.error("주가 데이터 로드 실패:", e);
            document.getElementById('tqqqClose').innerText = "오류";
            document.getElementById('soxlClose').innerText = "오류";
            document.getElementById('vixIndex').innerText = "오류";
        }

        try {
            // Fear & Greed 지수 가져오기
            const fnfUrl = 'https://api.alternative.me/fng/'; 
            const response = await fetch(fnfUrl);
            const result = await response.json();
            if (result.data && result.data[0]) {
                const fngValue = result.data[0].value;
                const fngStatus = result.data[0].value_classification; 
                document.getElementById('fearGreed').innerText = `${fngValue} (${fngStatus})`;
            }
        } catch (e) {
            console.error("Fear & Greed 데이터 로드 실패:", e);
            document.getElementById('fearGreed').innerText = "오류";
        }
    }

    async function loadDashboardData() {
        try {
            // 자산 데이터와 인터넷 시장 지표 데이터를 동시에 가져옵니다.
            const [sheetRes] = await Promise.all([
                fetch(URL),
                fetchMarketData()
            ]);
            
            const data = await sheetRes.json();
            
            if (!data.values || data.values.length === 0) {
                document.getElementById('loading').innerText = "시트의 U열과 V열에 데이터가 없거나 형식이 올바르지 않습니다.";
                return;
            }

            // 제목행 제거
            if (data.values[0][0] === "일자") {
                data.values.shift(); 
            }

            const dates = [];
            const balances = [];
            
            // 데이터 정제
            data.values.forEach(row => {
                if(row[0] && row[1]) {
                    dates.push(row[0]); 
                    const cleanNumber = Number(row[1].replace(/[^0-9.-]+/g,""));
                    balances.push(cleanNumber); 
                }
            });

            // 🧮 대시보드 카드용 데이터 계산
            const currentBal = balances[0]; 
            const previousBal = balances[1] || currentBal; 
            const change = currentBal - previousBal; 
            const maxBal = Math.max(...balances); 
            const totalDays = balances.length; 

            // 🎨 요약 카드 화면에 반영
            document.getElementById('currentBalance').innerText = currentBal.toLocaleString() + '원';
            
            if(change > 0) {
                document.getElementById('dayChange').innerText = '▲ ' + change.toLocaleString() + '원';
                document.getElementById('dayChange').style.color = '#1cc88a';
            } else if(change < 0) {
                document.getElementById('dayChange').innerText = '▼ ' + Math.abs(change).toLocaleString() + '원';
                document.getElementById('dayChange').style.color = '#e74a3b';
            } else {
                document.getElementById('dayChange').innerText = '변동 없음';
            }
            
            document.getElementById('maxBalance').innerText = maxBal.toLocaleString() + '원';
            document.getElementById('recordDays').innerText = totalDays.toLocaleString() + '일';

            // 로딩 숨기고 콘텐츠 보이기
            document.getElementById('loading').style.display = 'none';
            document.getElementById('cardsSection').style.display = 'grid';
            document.getElementById('chartSection').style.display = 'block';
            document.getElementById('marketSectionTitle').style.display = 'block';
            document.getElementById('marketCardsSection').style.display = 'grid';

            // 차트 그리기를 위해 과거순으로 배열 뒤집기
            dates.reverse();
            balances.reverse();

            // 차트 생성
            const ctx = document.getElementById('assetLineChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '총 자산 잔고',
                        data: balances,
                        borderColor: '#4e73df',
                        backgroundColor: 'rgba(78, 115, 223, 0.05)',
                        borderWidth: 2,
                        pointBackgroundColor: '#4e73df',
                        pointRadius: 1,           
                        pointHoverRadius: 4,      
                        tension: 0.2 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false, 
                            ticks: {
                                callback: function(value) {
                                    return value.toLocaleString() + '원'; 
                                }
                            }
                        }
                    }
                }
            });

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "데이터를 불러오는 데 실패했습니다.";
        }
    }

    loadDashboardData();
</script>
</body>
</html>
